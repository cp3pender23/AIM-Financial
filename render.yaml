services:
  - type: web
    name: aim
    runtime: docker
    plan: free
    region: ohio
    branch: features/CP
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_GCServer
        value: "0"
      - key: DOTNET_gcConcurrent
        value: "0"
      - key: DOTNET_TieredPGO
        value: "0"
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Seed__ColinPassword
        sync: false
